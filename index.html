<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="dist/index.js" type="module" defer></script>
    <style>
        body {
            margin: 0%;
            padding: 0%;
            overflow: hidden;
        }

        #grid-container {
            width: 100Vw;
            height: 95Vh;
        }

        #excelCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: cell;
        }

        .mainContainer {
            display: flex;
        }

        .controls {
            width: 20%;
            height: 100%;
            background: #929292;
        }

        .footer {
            display: flex;
            border-top: 1px solid black;
            background-color: #f1f1f1;
            height: 5Vh;
        }

        .custom-button {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
            margin: 5px;
            border-radius: 10px;
            border: 1px solid grey;
            cursor: pointer;
            font-family: sans-serif;
        }

        .custom-button:hover {
            background-color: #cdcdcd;
        }

        #status-bar{
            display: flex;
            width: 100%;
            justify-content: space-evenly;
        }
        .summary{
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="mainContainer">
        <div id="grid-container">
            <canvas id="excelCanvas"></canvas>
        </div>
    </div>
    <footer class="footer">
        <label for="load-file" class="custom-button">File</label>
        <input type="file" id="load-file" accept=".json" hidden />

        <div id="status-bar">
            <span class="summary">count: <div id="count">-</div></span>
            <span class="summary">min: <div  id="min">-</div></span>
            <span class="summary">max: <div  id="max">-</div></span>
            <span class="summary">sum: <div  id="sum">-</div></span>
            <span class="summary">avg: <div  id="avg">-</div></span>
        </div>
    </footer>

</body>

</html>
