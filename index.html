<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="dist/index.js" type="module" defer></script>
    <style>
        body {
            margin: 0%;
            padding: 0%;
            overflow: hidden;
        }

        #grid-container {
            width: 100Vw;
            height: 95Vh;
        }

        #excelCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: cell;
        }

        .mainContainer {
            display: flex;
        }

        .controls {
            width: 20%;
            height: 100%;
            background: #929292;
        }

        .footer {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f1f1f1;
            width: 100%;
            height: 5Vh;
        }

        .custom-button {
            background-color: #0ca701;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-family: sans-serif;
        }

        .custom-button:hover {
            background-color: #38b348;
        }
    </style>
</head>

<body>
    <div class="mainContainer">
        <div id="grid-container">
            <canvas id="excelCanvas"></canvas>
        </div>
    </div>
    <footer class="footer">
        <label for="load-file" class="custom-button">Choose JSON File</label>
        <input type="file" id="load-file" accept=".json" hidden />
    </footer>

</body>

</html>
